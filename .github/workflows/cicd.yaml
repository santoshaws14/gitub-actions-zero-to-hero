# this is name of the workflow that will be displayed in the Actions Tab
name: CICD

# Manual click (deliver) workflow whenever user needs
on:
  workflow_dispatch: 
    inputs:
      environmennt:
        description: This is the environment value where  this workflow runs
        default: 'dev'
        required: true
        type: choice
        options:
          - dev
          - prod
          - staging

jobs:
# every job needs separate runner, its called paralleism
  code:
    runs-on: ubuntu-latest
    steps:
      - name: checkout code
        run: echo "Code Clone from GitHub"
  build:
    needs: [code]
    runs-on: ubuntu-latest
    steps:
      - name: Build Docker Container
        run: echo "Docker Container Build" 
  test:
    needs: [build]
    runs-on: ubuntu-latest
    steps:
      - name: Test the container
        run: echo "Testing the container"
  deploy:
    if: inputs.environmennt == 'dev'
    needs: [build,test] # needs test
    runs-on: ubuntu-latest
    steps:
      - name: Deploying the app
        run: echo "Docker compose deployed the app"
