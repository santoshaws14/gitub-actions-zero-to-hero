# this is name of the workflow
name: Portfolio
on:
    push:
        branches: [main]

permissions:
    pages: write
    id-token: write

jobs:
    deploy:
        runs-on: ubuntu-latest

        environment:
            name: github-pages
            url: ${{steps.deployment.outputs.page_url}}
        steps:
            # get access to your Portfolio code vai pre-built actions
            # clone or checks  out the code where this workflow is written
            # STEP 1
            - name: Checkout code
              uses: actions/checkout@v4

            # setup GitHub pages
            # STEP 2
            - name: Setup GitHub Pages
              uses: actions/configure-pages@v4

            # static code artifacts
            # STEP 3
            - name: Upload static files
              uses: actions/upload-pages-artifact@v4

            # Make page Live
            # STEP 4
            - name: Deploy to Github pages
              uses: actions/deploy-pages@v4




